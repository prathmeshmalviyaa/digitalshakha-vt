<!DOCTYPE html>
<html lang="en">
<head>
    <title>STUDENT REGISTRATION FORM </title>
</head>
<body>
    <h4>STUDENT REGISTRATION FORM </h4> 
    <pre>
    <form>
        <label> FIRST NAME: </label>
        <input type="text" placeholder="ENTER NAME">
        <label> LAST NAME: </label>
        <input type="text" placeholder="ENTER LAST NAME">
        <label> EMAIL: </label>
        <input type="email" placeholder="ENTER EMAIL">
        <label> PASSWORD: </label>
        <input type="password" placeholder="ENTER PASSWORD">
        <label> CONFIRM PASSWORD </label>
        <input type="password" placeholder="CONFIRM PASSWORD">
        <label> DATE OF BIRTH </label>
        <input type="date" >
        <label> GENDER </label>
        <input type="radio" id="male" name="male" title="male">   <input type="radio" id="female" name="female" title="female">   <input type="radio" id="others" title="others"> 
        <label>male female others</label>

        <label> ADDRESS </label>
        <textarea id="address" 
        name="address"
        rows="5"
        cols="50"
        placeholder="ENTER ADDRESS"> 
        </textarea>
        <button type="reset" title="reset"><label>RESET</label>
            
 
        <button type="submit" title="submit"><label>SUBMIT</label>
       
    </form>
    </pre>
</body>
</html>
